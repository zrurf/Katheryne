services:
  ### 微服务 ###

  # 网关
  gateway_api:
    build: 
      context: .
      dockerfile: services/api/gateway/Dockerfile
    container_name: gateway-api
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env
    networks:
      - public
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  # WebSocket 网关
  ws_gateway:
    build:
      context: .
      dockerfile: services/api/ws-gateway/Dockerfile
    container_name: ws-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - public
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  # 服务
  auth_services:
    build:
      context: .
      dockerfile: services/internal/auth/Dockerfile
    container_name: auth-services
    restart: unless-stopped
    expose:
      - "8001"
      - "6061"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  social_services:
    build:
      context: .
      dockerfile: services/internal/social/Dockerfile
    container_name: social-services
    restart: unless-stopped
    expose:
      - "8002"
      - "6062"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  message_services:
    build:
      context: .
      dockerfile: services/internal/message/Dockerfile
    container_name: message-services
    restart: unless-stopped
    expose:
      - "8003"
      - "6063"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  conversation_services:
    build:
      context: .
      dockerfile: services/internal/conversation/Dockerfile
    container_name: conversation-services
    restart: unless-stopped
    expose:
      - "8004"
      - "6064"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  oss_services:
    build:
      context: .
      dockerfile: services/internal/oss/Dockerfile
    container_name: oss-services
    restart: unless-stopped
    expose:
      - "8005"
      - "6066"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started
      rustfs:
        condition: service_started

  user_services:
    build:
      context: .
      dockerfile: services/internal/user/Dockerfile
    container_name: user-services
    restart: unless-stopped
    expose:
      - "8006"
      - "6067"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  bot_services:
    build:
      context: .
      dockerfile: services/internal/bot/Dockerfile
    container_name: bot-services
    restart: unless-stopped
    expose:
      - "8010"
      - "6070"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started

  # RAG 知识库服务
  rag_services:
    build:
      context: .
      dockerfile: services/internal/rag/Dockerfile
    container_name: rag-services
    restart: unless-stopped
    expose:
      - "8007"
      - "6068"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started
      qdrant:
        condition: service_started
      hugegraph:
        condition: service_started

  # 官方 AI Bot
  ai_bot:
    build:
      context: .
      dockerfile: services/thirdparty/ai-bot/Dockerfile
    container_name: ai-bot
    restart: unless-stopped
    expose:
      - "8889"
    env_file:
      - .env
    dns:
      - 119.29.29.29
      - 223.5.5.5
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_started
      garnet:
        condition: service_started
      etcd:
        condition: service_started
      gateway_api:
        condition: service_started
      bot_services:
        condition: service_started
      ws_gateway:
        condition: service_started

  ### 基础设施 ###

  # 内存数据库
  garnet:
    image: "ghcr.io/microsoft/garnet-alpine:1.1.8"
    container_name: garnet
    ulimits:
      memlock: -1
    expose:
      - "6379"
    volumes:
      - garnet_data:/data
    networks:
      - internal

  # 消息队列
  nats:
    image: "nats:2.14.0-alpine3.22"
    container_name: nats
    expose:
      - "4222"
      - "6222"
      - "8222"
    networks:
      - internal
  
  # 数据库
  postgres:
    image: "postgres:18.3-alpine3.23"
    container_name: postgres
    environment:
      - PGDATA=/data/pgdata
      - DATABASES=users,oauth2,im_social,im_message,mod_bot,mod_rag
    env_file:
      - .env
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/sql:/etc/sql
      - db:/data
    restart: unless-stopped
    networks:
      - internal
    expose:
        - "5432"

  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: qdrant
    restart: always
    expose:
      - "6333"
      - "6334"
      - "6335"
    networks:
      - internal
    volumes:
      - ./config/qdrant.yaml:/qdrant/config/production.yaml:ro
      - qdrant_data:/qdrant/storage
  
  # Etcd
  etcd:
    image: quay.io/coreos/etcd:v3.6.10
    container_name: etcd
    command: ["etcd", "--config-file=/etc/etcd.yaml"]
    volumes:
      - etcd_data:/data/etcd
      - ./config/etcd.yaml:/etc/etcd.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - public
      - internal
    restart: always

  # 对象存储 RustFS
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.2
    container_name: rustfs
    environment:
      - RUSTFS_VOLUMES=/data/rustfs
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_METRICS_ENABLED=true
      - RUSTFS_METRICS_TYPES=511
      - RUSTFS_METRICS_INTERVAL=15
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_OBS_ENDPOINT=http://otel-collector:4318
    env_file:
      - .env
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/app/logs
    expose:
      - "9000"
    ports:
      - "9001:9001"
    networks:
      - public
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      otel-collector:
        condition: service_started
        required: false
  
  # 图数据库
  hugegraph:
    image: hugegraph/hugegraph:1.7.0
    container_name: hugegraph
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - HUGEGRAPH_URL=http://hugegraph:8080
    networks:
      - internal
    volumes:
      - hugegraph_data:/hugegraph-server/data
  
  ### 可观测性 ###

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    container_name: jaeger
    ports:
      - "16686:16686" # Web UI
      - "14269:14269" # Admin/Metrics
    environment:
      - TZ=Asia/Shanghai
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
      - COLLECTOR_OTLP_ENABLED=true
    env_file:
      - .env
    volumes:
      - jaeger_data:/badger
    restart: unless-stopped
    networks:
      - public
      - internal

  tempo:
    image: grafana/tempo:r251-49bcd72
    container_name: tempo
    user: "10001"
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./config/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # tempo
    expose:
      - "4317"      # otlp grpc
      - "4318"      # otlp http
    restart: unless-stopped
    networks:
      - public
      - internal

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    expose:
      - "9090"
    volumes:
      - ./config/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-otlp-receiver"
      - "--web.enable-remote-write-receiver"
    networks:
      - internal
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config/observability/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    container_name: otel-collector
    command:
      - --config=/etc/otelcol-contrib/otel-collector.yml
    volumes:
      - ./config/observability/otel-collector-config.yaml:/etc/otelcol-contrib/otel-collector.yml:ro
    ports:
      - "8888:8888"   # Prometheus metrics for Collector
      - "8889:8889"   # Prometheus metrics for application indicators
      - "13133:13133" # health check
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    expose:
      - "1888"  # pprof
      - "55679" # zpages
    networks:
      - public
      - internal
    restart: unless-stopped
    depends_on:
      - tempo
      - jaeger
      - prometheus
      - loki
  
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=grafana-pyroscope-datasource
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - public
      - internal
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
      - loki

networks:
  # 公共层
  public:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # 内部层
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  db:
  etcd_data:
  garnet_data:
  rustfs_data:
  qdrant_data:
  hugegraph_data:

  jaeger_data:
  tempo_data:
  prometheus_data:
  loki_data:
  grafana_data:

  rustfs_logs: