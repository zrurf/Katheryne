syntax = "proto3";
package oss;
option go_package = "./oss";

service OSS {
    // 简单上传（流式，适用于中小文件如图片、音频等）
    rpc SimpleUpload(stream SimpleUploadReq) returns (UploadResp);
    // 初始化分片上传，返回 UploadId
    rpc InitiateMultipartUpload(InitiateUploadReq) returns (InitiateUploadResp);
    // 上传分片（流式）
    rpc UploadPart(stream UploadPartReq) returns (UploadPartResp);
    // 完成分片上传（合并）
    rpc CompleteMultipartUpload(CompleteUploadReq) returns (UploadResp);
    // 取消上传
    rpc AbortMultipartUpload(AbortUploadReq) returns (AbortUploadResp);
    // 获取文件下载 URL
    rpc GetDownloadURL(GetDownloadURLReq) returns (GetDownloadURLResp);
    // 删除文件
    rpc DeleteFile(DeleteFileReq) returns (DeleteFileResp);
    // 获取文件信息
    rpc GetFileInfo(GetFileInfoReq) returns (GetFileInfoResp);
}

// ========== 简单上传 ==========
message SimpleUploadReq {
    oneof data {
        FileMeta meta = 1;    // 第一条消息：文件元数据
        bytes chunk = 2;      // 后续消息：文件内容分片
    }
}

message FileMeta {
    string file_name = 1;    // 原始文件名
    string content_type = 2; // MIME类型
}

// ========== 分片上传 ==========
// 初始化请求
message InitiateUploadReq {
    string file_name = 1;      // 原始文件名
    string content_type = 2;   // MIME类型
    int64 total_size = 3;      // 总大小（可选，用于校验）
}

message InitiateUploadResp {
    string upload_id = 1;      // 本次上传唯一ID
    string bucket = 2;         // 存储桶
    string object_key = 3;     // 对象在存储中的路径
}

// 分片上传请求（流式）
message UploadPartReq {
    string upload_id = 1;
    int32 part_number = 2;     // 分片序号（从1开始）
    bytes data = 3;            // 分片内容（最大5MB-100MB，由客户端控制）
}

message UploadPartResp {
    string etag = 1;           // 分片ETag，用于合并时校验
    int32 part_number = 2;
}

// 完成上传
message CompleteUploadReq {
    string upload_id = 1;
    string bucket = 2;
    string object_key = 3;
    repeated PartInfo parts = 4;   // 已完成的分片信息
}

message PartInfo {
    int32 part_number = 1;
    string etag = 2;
}

// 取消上传
message AbortUploadReq {
    string upload_id = 1;
    string bucket = 2;
    string object_key = 3;
}

message AbortUploadResp {}

// 最终返回
message UploadResp {
    string url = 1;          // 访问URL（带签名）
    int64 size = 2;          // 最终文件大小
    string oss_index = 3;    // 内部标识（object_key，内容哈希路径）
    int64 expires_at = 4;    // URL过期时间戳
    string content_type = 5; // MIME类型
    string index_id = 6;     // 永久文件索引ID（用于显示文件名、获取信息等）
    string file_name = 7;    // 原始文件名（从index中获取）
}

// ========== 下载 ==========
message GetDownloadURLReq {
    string object_key = 1;   // 对象key（内容哈希路径）
    string index_id = 2;     // 或使用文件索引ID（优先）
    int64 expire_secs = 3;   // 过期秒数（默认3600）
}

message GetDownloadURLResp {
    string url = 1;          // 带签名的下载URL
    int64 expires_at = 2;    // URL过期时间戳
}

// ========== 删除 ==========
message DeleteFileReq {
    string object_key = 1;   // 对象key
    string index_id = 2;     // 或使用文件索引ID（优先）
}

message DeleteFileResp {
    bool deleted = 1;        // 是否成功
}

// ========== 文件信息 ==========
message GetFileInfoReq {
    string object_key = 1;   // 对象key
    string index_id = 2;     // 或使用文件索引ID（优先）
}

message GetFileInfoResp {
    string object_key = 1;   // 对象key（内容哈希路径）
    int64 size = 2;          // 文件大小
    string content_type = 3; // MIME类型
    string etag = 4;         // ETag
    int64 last_modified = 5; // 最后修改时间戳
    string file_name = 6;    // 原始文件名（从index中获取）
    string index_id = 7;     // 文件索引ID
}