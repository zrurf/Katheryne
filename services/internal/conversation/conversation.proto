syntax = "proto3";

package conversation;

option go_package = "./conversation";

message ConversationItem {
  int64 conv_id = 1;
  string type = 2;
  string name = 3;
  string avatar = 4;
  int64 group_id = 5;
  int64 last_msg_id = 6;
  string last_msg_snippet = 7;
  int64 last_msg_time = 8;
  int64 last_msg_sender = 9;
  int64 unread_count = 10;
  bool mute = 11;
  bool pinned = 12;
  int64 uid = 13;
  int64 peer_uid = 14;
}

message GetConversationsReq { int64 uid = 1; }
message GetConversationsResp { repeated ConversationItem list = 1; }

message GetOrCreateSingleConvReq {
  int64 uid = 1;
  int64 peer_uid = 2;
}
message GetOrCreateSingleConvResp {
  int64 conv_id = 1;
  bool created = 2;
}

message GetConversationReq {
  int64 conv_id = 1;
  int64 uid = 2;
}
message GetConversationResp {
  int64 conv_id = 1;
  string type = 2;
  string name = 3;
  string avatar = 4;
  int64 group_id = 5;
  bool mute = 6;
  bool pinned = 7;
  int64 uid = 8;
  int64 peer_uid = 9;
}

message DeleteConversationReq { int64 conv_id = 1; int64 uid = 2; }
message DeleteConversationResp {}

message SetConvMuteReq { int64 conv_id = 1; int64 uid = 2; bool mute = 3; }
message SetConvMuteResp {}

message SetConvPinReq { int64 conv_id = 1; int64 uid = 2; bool pinned = 3; }
message SetConvPinResp {}

message CreateGroupConvReq {
  int64 group_id = 1;
  string name = 2;
  string avatar = 3;
  repeated int64 member_uids = 4;
}
message CreateGroupConvResp { int64 conv_id = 1; }

message AddConvMembersReq {
  int64 conv_id = 1;
  repeated int64 uids = 2;
}
message AddConvMembersResp {}

message RemoveConvMembersReq {
  int64 conv_id = 1;
  repeated int64 uids = 2;
}
message RemoveConvMembersResp {}

message GetConvMembersReq { int64 conv_id = 1; }
message GetConvMembersResp { repeated int64 uids = 1; }

message ClearUnreadReq {
  int64 conv_id = 1;
  int64 uid = 2;
}
message ClearUnreadResp {}

message GetTotalUnreadReq { int64 uid = 1; }
message GetTotalUnreadResp { int64 count = 1; }

message UpdateLastMessageReq {
  int64 conv_id = 1;
  int64 msg_id = 2;
  string snippet = 3;
  int64 sender = 4;
}
message UpdateLastMessageResp {}

message IncrementUnreadReq {
  int64 conv_id = 1;
  repeated int64 uids = 2;
}
message IncrementUnreadResp {}

service conversation {
  rpc GetConversations(GetConversationsReq) returns (GetConversationsResp);
  rpc GetOrCreateSingleConv(GetOrCreateSingleConvReq) returns (GetOrCreateSingleConvResp);
  rpc GetConversation(GetConversationReq) returns (GetConversationResp);
  rpc DeleteConversation(DeleteConversationReq) returns (DeleteConversationResp);
  rpc SetConvMute(SetConvMuteReq) returns (SetConvMuteResp);
  rpc SetConvPin(SetConvPinReq) returns (SetConvPinResp);
  rpc CreateGroupConv(CreateGroupConvReq) returns (CreateGroupConvResp);
  rpc AddConvMembers(AddConvMembersReq) returns (AddConvMembersResp);
  rpc RemoveConvMembers(RemoveConvMembersReq) returns (RemoveConvMembersResp);
  rpc GetConvMembers(GetConvMembersReq) returns (GetConvMembersResp);
  rpc ClearUnread(ClearUnreadReq) returns (ClearUnreadResp);
  rpc GetTotalUnread(GetTotalUnreadReq) returns (GetTotalUnreadResp);
  rpc UpdateLastMessage(UpdateLastMessageReq) returns (UpdateLastMessageResp);
  rpc IncrementUnread(IncrementUnreadReq) returns (IncrementUnreadResp);
}
