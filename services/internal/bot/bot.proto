syntax = "proto3";

package bot;

option go_package = "./bot";

// ========== Bot 信息 ==========
message BotInfo {
  int64 bot_id = 1;
  string name = 2;
  string avatar = 3;
  string description = 4;
  int64 owner_uid = 5;
  string webhook_url = 6;
  repeated string subscribe_events = 7;
  string status = 8;
  string client_id = 9;
  int64 created_at = 10;
}

message BotInstallationItem {
  int64 conv_id = 1;
  string conv_type = 2;
  int64 group_id = 3;
  string conv_name = 4;
  repeated string permissions = 5;
  int64 installed_at = 6;
}

message InstalledBotItem {
  int64 bot_id = 1;
  string name = 2;
  string avatar = 3;
  string description = 4;
  repeated string permissions = 5;
  int64 installed_at = 6;
}

// ========== Developer APIs ==========
message CreateBotReq {
  int64 owner_uid = 1;
  string name = 2;
  string avatar = 3;
  string description = 4;
  string webhook_url = 5;
  repeated string subscribe_events = 6;
}
message CreateBotResp {
  int64 bot_id = 1;
  string client_id = 2;
  string client_secret = 3;
}

message ListMyBotsReq {
  int64 owner_uid = 1;
}
message ListMyBotsResp {
  repeated BotInfo list = 1;
}

message GetBotReq {
  int64 bot_id = 1;
  int64 uid = 2;
}
message GetBotResp {
  BotInfo bot = 1;
}

message UpdateBotReq {
  int64 uid = 1;
  int64 bot_id = 2;
  string name = 3;
  string avatar = 4;
  string description = 5;
  string webhook_url = 6;
  repeated string subscribe_events = 7;
}
message UpdateBotResp {}

message DeleteBotReq {
  int64 uid = 1;
  int64 bot_id = 2;
}
message DeleteBotResp {}

message GetBotInstallationsReq {
  int64 uid = 1;
  int64 bot_id = 2;
}
message GetBotInstallationsResp {
  repeated BotInstallationItem list = 1;
}

message GetBotRateLimitReq {
  int64 uid = 1;
  int64 bot_id = 2;
}
message GetBotRateLimitResp {
  int64 messages_per_minute = 1;
  int64 messages_per_day = 2;
  int64 api_calls_per_minute = 3;
}

message UpdateBotRateLimitReq {
  int64 uid = 1;
  int64 bot_id = 2;
  int64 messages_per_minute = 3;
  int64 messages_per_day = 4;
  int64 api_calls_per_minute = 5;
}
message UpdateBotRateLimitResp {}

message RegenerateCredentialReq {
  int64 uid = 1;
  int64 bot_id = 2;
}
message RegenerateCredentialResp {
  string client_id = 1;
  string client_secret = 2;
}

message RotateWebhookSecretReq {
  int64 uid = 1;
  int64 bot_id = 2;
}
message RotateWebhookSecretResp {
  string webhook_secret = 1;
}

message GetEventDeliveriesReq {
  int64 bot_id = 1;
  int64 conv_id = 2;
  string event_type = 3;
  string status = 4;
  int32 page = 5;
  int32 size = 6;
}
message EventDeliveryItem {
  string event_id = 1;
  string event_type = 2;
  int64 conv_id = 3;
  string delivery_method = 4;
  string status = 5;
  int32 retry_count = 6;
  int32 response_code = 7;
  string last_error = 8;
  int64 delivered_at = 9;
  int64 created_at = 10;
}
message GetEventDeliveriesResp {
  repeated EventDeliveryItem list = 1;
  int64 total = 2;
}

message RetryEventDeliveryReq {
  string event_id = 1;
}
message RetryEventDeliveryResp {}

// ========== Installation APIs ==========
message GetConvBotsReq {
  int64 conv_id = 1;
}
message GetConvBotsResp {
  repeated InstalledBotItem list = 1;
}

message InstallBotReq {
  int64 uid = 1;
  int64 bot_id = 2;
  int64 conv_id = 3;
  repeated string permissions = 4;
  // 自托管实例化参数（仅当安装模板时使用）
  int64 template_id = 5;                // 非 0 表示从模板实例化
  string model_provider = 6;
  string model_name = 7;
  string api_key = 8;
  string kb_config = 9;                 // JSON
}
message InstallBotResp {
  int64 instance_id = 1;                // 自托管时返回新实例 ID，托管时为 0
}

message UninstallBotReq {
  int64 uid = 1;
  int64 bot_id = 2;
  int64 conv_id = 3;
}
message UninstallBotResp {}

// ========== Bot 模板（Template） ==========
message BotTemplateInfo {
  int64 template_id = 1;
  string name = 2;
  string avatar = 3;
  string description = 4;
  int64 owner_uid = 5;
  string category = 6;                    // OFFICIAL / COMMUNITY / CUSTOM
  string version = 7;
  string system_prompt = 8;
  string welcome_message = 9;
  string conversation_style = 10;         // JSON: {multi_message, split_delimiter, use_emoji, ...}
  string tool_definitions = 11;           // JSON array
  string kb_structure = 12;              // JSON: {require_kb, kb_description}
  string config_schema = 13;             // JSON schema for instance config
  string supported_models = 14;          // JSON array
  bool is_official = 15;
  repeated string tags = 16;
  string status = 17;
  int64 created_at = 18;
  int64 updated_at = 19;
}

message CreateBotTemplateReq {
  int64 owner_uid = 1;
  string name = 2;
  string avatar = 3;
  string description = 4;
  string category = 5;
  string system_prompt = 6;
  string welcome_message = 7;
  string conversation_style = 8;
  string tool_definitions = 9;
  string kb_structure = 10;
  string config_schema = 11;
  string supported_models = 12;
  repeated string tags = 13;
}
message CreateBotTemplateResp {
  int64 template_id = 1;
}

message UpdateBotTemplateReq {
  int64 uid = 1;
  int64 template_id = 2;
  string name = 3;
  string avatar = 4;
  string description = 5;
  string category = 6;
  string system_prompt = 7;
  string welcome_message = 8;
  string conversation_style = 9;
  string tool_definitions = 10;
  string kb_structure = 11;
  string config_schema = 12;
  string supported_models = 13;
  repeated string tags = 14;
}
message UpdateBotTemplateResp {}

message DeleteBotTemplateReq {
  int64 uid = 1;
  int64 template_id = 2;
}
message DeleteBotTemplateResp {}

message GetBotTemplateReq {
  int64 template_id = 1;
}
message GetBotTemplateResp {
  BotTemplateInfo template = 1;
}

message ListMyTemplatesReq {
  int64 owner_uid = 1;
}
message ListMyTemplatesResp {
  repeated BotTemplateInfo list = 1;
}

message PublishBotTemplateReq {
  int64 uid = 1;
  int64 template_id = 2;
}
message PublishBotTemplateResp {}

// ========== Bot 实例（Instance） ==========
message BotInstanceInfo {
  int64 instance_id = 1;
  int64 bot_id = 2;                       // 关联的 Bot 身份
  int64 template_id = 3;
  int64 owner_uid = 4;
  string name = 5;
  string avatar = 6;
  bool is_self_hosted = 7;
  int64 hosted_by = 8;
  string model_provider = 9;
  string model_name = 10;
  string kb_config = 11;                  // JSON: {source, kb_ids, external_kb}
  string instance_config = 12;            // JSON
  string status = 13;
  int64 created_at = 14;
  BotTemplateInfo template = 15;          // 关联的模板信息
}

message CreateBotInstanceReq {
  int64 uid = 1;                          // 消费者 UID
  int64 template_id = 2;
  string name = 3;
  string avatar = 4;
  bool is_self_hosted = 5;
  int64 hosted_by = 6;
  string model_provider = 7;
  string model_name = 8;
  string api_key = 9;                     // 明文传入，服务端加密存储
  string api_base_url = 10;
  string kb_config = 11;                  // JSON
  string instance_config = 12;            // JSON
}
message CreateBotInstanceResp {
  int64 instance_id = 1;
  int64 bot_id = 2;
  string client_id = 3;
  string client_secret = 4;
  string bot_token = 5;                   // ws-gateway 连接 token
}

message UpdateBotInstanceReq {
  int64 uid = 1;
  int64 instance_id = 2;
  string name = 3;
  string avatar = 4;
  string model_provider = 5;
  string model_name = 6;
  string api_key = 7;
  string api_base_url = 8;
  string kb_config = 9;
  string instance_config = 10;
}
message UpdateBotInstanceResp {}

message DeleteBotInstanceReq {
  int64 uid = 1;
  int64 instance_id = 2;
}
message DeleteBotInstanceResp {}

message GetBotInstanceReq {
  int64 instance_id = 1;
  int64 bot_id = 2;                       // 也可通过 bot_id 查询
  int64 uid = 3;
}
message GetBotInstanceResp {
  BotInstanceInfo instance = 1;
}

message ListMyInstancesReq {
  int64 owner_uid = 1;
}
message ListMyInstancesResp {
  repeated BotInstanceInfo list = 1;
}

// ListHostedInstances: 供 ai-bot 编排器获取所有需要托管的实例（is_self_hosted=false）
message ListHostedInstancesReq {}
message ListHostedInstancesResp {
  repeated BotInstanceInfo list = 1;
}

// ========== Bot 社区（混合展示模板 + 托管实例） ==========
message CommunityBotItem {
  string type = 1;                        // "hosted" (托管实例) / "template" (自托管模板)
  // 托管实例字段
  int64 instance_id = 2;
  int64 bot_id = 3;
  string name = 4;
  string avatar = 5;
  string description = 6;
  int64 hosted_by = 7;
  int64 installed_count = 8;              // 安装次数
  string status = 9;
  // 模板字段
  int64 template_id = 10;
  string category = 11;                   // OFFICIAL / COMMUNITY
  repeated string tags = 12;
  bool is_official = 13;
}

message ListCommunityBotsReq {
  string keyword = 1;
  string section = 2;                     // "all" / "hosted" / "templates"
  string category = 3;                    // 模板分类过滤
}
message ListCommunityBotsResp {
  repeated CommunityBotItem hosted_bots = 1;     // 托管实例列表
  repeated CommunityBotItem templates = 2;       // 模板列表
}

// ========== @Mention 与 Bot 通信 ==========
message ParseMentionsReq {
  string content = 1;                     // 消息正文（可能含 @[bot:xxx:yyy]）
}
message MentionItem {
  string type = 1;                        // "bot" / "user"
  int64 target_id = 2;                    // bot_id 或 uid
  string display_name = 3;                // 展示名
  int32 start_pos = 4;                    // 在原文中的起始位置
  int32 end_pos = 5;                      // 在原文中的结束位置
}
message ParseMentionsResp {
  repeated MentionItem mentions = 1;
}

// 验证 Bot 连接 token
message VerifyBotTokenReq {
  string bot_token = 1;
}
message VerifyBotTokenResp {
  bool valid = 1;
  int64 bot_id = 2;
  int64 instance_id = 3;
  bool is_official = 4;
}

// 获取 Bot 实例的运行配置（给 ai-bot 服务用）
message GetBotRuntimeConfigReq {
  int64 bot_id = 1;
  int64 conv_id = 2;                      // 用于加载会话级别的 KB 授权
}
message GetBotRuntimeConfigResp {
  int64 instance_id = 1;
  int64 bot_id = 2;
  string model_provider = 3;
  string model_name = 4;
  string api_key = 5;                     // 解密后的 API Key
  string api_base_url = 6;
  string system_prompt = 7;              // 来自模板
  string conversation_style = 8;         // 来自模板 (JSON)
  string tool_definitions = 9;           // 来自模板 (JSON)
  string kb_config = 10;                 // 来自实例 (JSON)
  string kb_ids = 11;                    // 已授权的 KB ID 列表 (逗号分隔)
  bool is_official = 12;                 // 是否官方 Bot（决定安全级别）
  string client_id = 13;                 // OAuth2 凭证（ai-bot 连接 ws-gateway 用）
  string client_secret = 14;             // OAuth2 凭证
  string name = 15;                      // Bot 名称
}

// ========== Bot APIs (bot 调用 Katheryne) ==========
message BotGetConvReq {
  int64 conv_id = 1;
}
message BotGetConvResp {
  int64 conv_id = 1;
  string type = 2;
  int64 group_id = 3;
  string name = 4;
  string avatar = 5;
  int64 created_at = 6;
}

message BotGetConvMembersReq {
  int64 conv_id = 1;
}
message BotConvMemberItem {
  int64 uid = 1;
  string name = 2;
  string avatar = 3;
  string role = 4;
  string nick = 5;
}
message BotGetConvMembersResp {
  repeated BotConvMemberItem members = 1;
}

message BotGetMsgReq {
  int64 conv_id = 1;
  int64 msg_id = 2;
}
message BotGetMsgResp {
  int64 msg_id = 1;
  int64 conv_id = 2;
  int64 sender_uid = 3;
  string sender_name = 4;
  string msg_type = 5;
  string content = 6;
  string content_type = 7;
  int64 quote_msg_id = 8;
  bool recalled = 9;
  bool edited = 10;
  string extra = 11;
  int64 created_at = 12;
}

message BotSendMsgReq {
  int64 bot_id = 1;
  int64 conv_id = 2;
  string msg_type = 3;
  string content = 4;
  string content_type = 5;
  int64 quote_msg_id = 6;
  string extra = 7;
}
message BotSendMsgResp {
  int64 msg_id = 1;
  int64 created_at = 2;
}

message BotRecallMsgReq {
  int64 bot_id = 1;
  int64 conv_id = 2;
  int64 msg_id = 3;
}
message BotRecallMsgResp {}

message BotReplyMsgReq {
  int64 bot_id = 1;
  int64 conv_id = 2;
  int64 reply_to_msg_id = 3;
  string msg_type = 4;
  string content = 5;
  string content_type = 6;
  string extra = 7;
}
message BotReplyMsgResp {
  int64 msg_id = 1;
  int64 created_at = 2;
}

message BotUploadFileReq {
  int64 bot_id = 1;
  string file_name = 2;
  string content_type = 3;
  int64 file_size = 4;
  bytes data = 5;
}
message BotUploadFileResp {
  string file_id = 1;
  string file_name = 2;
  int64 file_size = 3;
  string url = 4;
  string mime_type = 5;
}

message BotGetUserReq {
  int64 uid = 1;
}
message BotGetUserResp {
  int64 uid = 1;
  string name = 2;
  string avatar = 3;
}

// ========== OAuth2 APIs ==========
message AuthorizeReq {
  string client_id = 1;
  string redirect_uri = 2;
  string scope = 3;
  string state = 4;
  int64 conv_id = 5;
}
message AuthorizeResp {
  BotInfo bot = 1;
  repeated string requested_scope = 2;
  int64 conv_id = 3;
}

message ApproveAuthorizeReq {
  int64 uid = 1;
  string client_id = 2;
  string redirect_uri = 3;
  string scope = 4;
  string state = 5;
  int64 conv_id = 6;
}
message ApproveAuthorizeResp {
  string redirect_url = 1;
}

message BotTokenReq {
  string grant_type = 1;
  string client_id = 2;
  string client_secret = 3;
  string code = 4;
  string redirect_uri = 5;
  string refresh_token = 6;
  string scope = 7;
}
message BotTokenResp {
  string access_token = 1;
  string token_type = 2;
  string scope = 3;
  int64 expires_in = 4;
  string refresh_token = 5;
  int64 bot_id = 6;
}

// ========== Service ==========
service bot {
  // Developer APIs (user-facing)
  rpc CreateBot(CreateBotReq) returns (CreateBotResp);
  rpc ListMyBots(ListMyBotsReq) returns (ListMyBotsResp);
  rpc ListCommunityBots(ListCommunityBotsReq) returns (ListCommunityBotsResp);
  rpc GetBot(GetBotReq) returns (GetBotResp);
  rpc UpdateBot(UpdateBotReq) returns (UpdateBotResp);
  rpc DeleteBot(DeleteBotReq) returns (DeleteBotResp);
  rpc GetBotInstallations(GetBotInstallationsReq) returns (GetBotInstallationsResp);
  rpc GetBotRateLimit(GetBotRateLimitReq) returns (GetBotRateLimitResp);
  rpc UpdateBotRateLimit(UpdateBotRateLimitReq) returns (UpdateBotRateLimitResp);
  rpc RegenerateCredential(RegenerateCredentialReq) returns (RegenerateCredentialResp);
  rpc RotateWebhookSecret(RotateWebhookSecretReq) returns (RotateWebhookSecretResp);
  rpc GetEventDeliveries(GetEventDeliveriesReq) returns (GetEventDeliveriesResp);
  rpc RetryEventDelivery(RetryEventDeliveryReq) returns (RetryEventDeliveryResp);

  // Template APIs (developer 创建和管理模板)
  rpc CreateBotTemplate(CreateBotTemplateReq) returns (CreateBotTemplateResp);
  rpc UpdateBotTemplate(UpdateBotTemplateReq) returns (UpdateBotTemplateResp);
  rpc DeleteBotTemplate(DeleteBotTemplateReq) returns (DeleteBotTemplateResp);
  rpc GetBotTemplate(GetBotTemplateReq) returns (GetBotTemplateResp);
  rpc ListMyTemplates(ListMyTemplatesReq) returns (ListMyTemplatesResp);
  rpc PublishBotTemplate(PublishBotTemplateReq) returns (PublishBotTemplateResp);

  // Instance APIs (消费者创建和管理实例)
  rpc CreateBotInstance(CreateBotInstanceReq) returns (CreateBotInstanceResp);
  rpc UpdateBotInstance(UpdateBotInstanceReq) returns (UpdateBotInstanceResp);
  rpc DeleteBotInstance(DeleteBotInstanceReq) returns (DeleteBotInstanceResp);
  rpc GetBotInstance(GetBotInstanceReq) returns (GetBotInstanceResp);
  rpc ListMyInstances(ListMyInstancesReq) returns (ListMyInstancesResp);
  rpc ListHostedInstances(ListHostedInstancesReq) returns (ListHostedInstancesResp);

  // Installation APIs
  rpc GetConvBots(GetConvBotsReq) returns (GetConvBotsResp);
  rpc InstallBot(InstallBotReq) returns (InstallBotResp);
  rpc UninstallBot(UninstallBotReq) returns (UninstallBotResp);

  // Bot 消息 & 通信
  rpc ParseMentions(ParseMentionsReq) returns (ParseMentionsResp);
  rpc VerifyBotToken(VerifyBotTokenReq) returns (VerifyBotTokenResp);
  rpc GetBotRuntimeConfig(GetBotRuntimeConfigReq) returns (GetBotRuntimeConfigResp);

  // Bot APIs (bot 调用 Katheryne)
  rpc BotGetConv(BotGetConvReq) returns (BotGetConvResp);
  rpc BotGetConvMembers(BotGetConvMembersReq) returns (BotGetConvMembersResp);
  rpc BotGetMsg(BotGetMsgReq) returns (BotGetMsgResp);
  rpc BotSendMsg(BotSendMsgReq) returns (BotSendMsgResp);
  rpc BotRecallMsg(BotRecallMsgReq) returns (BotRecallMsgResp);
  rpc BotReplyMsg(BotReplyMsgReq) returns (BotReplyMsgResp);
  rpc BotUploadFile(BotUploadFileReq) returns (BotUploadFileResp);
  rpc BotGetUser(BotGetUserReq) returns (BotGetUserResp);

  // OAuth2 APIs
  rpc Authorize(AuthorizeReq) returns (AuthorizeResp);
  rpc ApproveAuthorize(ApproveAuthorizeReq) returns (ApproveAuthorizeResp);
  rpc BotToken(BotTokenReq) returns (BotTokenResp);
}