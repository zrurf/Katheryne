Name: ai-bot
Host: 0.0.0.0
Port: 8889
Timeout: 120000

Middlewares:
  Metrics: true

Telemetry:
  Name: ai-bot
  Endpoint: otel-collector:4317
  Batcher: otlpgrpc
  Sampler: 1.0

BotAPITokenURL: "http://gateway-api/api/v1/bot/oauth2/token"
BotAPIRefreshURL: "http://gateway-api/api/v1/bot/oauth2/token"
WSGatewayURL: "ws://ws-gateway:8080/api/v1/bot/ws"

BotClientID: "katheryne_ai_official_bot"
BotClientSecret: "kth_official_secret_v1_production"

LLM:
  Provider: "openai"
  APIKey: "${OPENAI_API_KEY}"
  BaseURL: "${OPENAI_BASE_URL}"
  Model: "${LLM_MODEL}"
  MaxTokens: 4096
  Temperature: 0.7

RagRpc:
  Etcd:
    Hosts:
    - "etcd:2379"
    Key: rag.rpc

BotRpc:
  Etcd:
    Hosts:
    - "etcd:2379"
    Key: bot.rpc